<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ksual Spa</title>
    
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind via CDN for quick configuration matching user request -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec13ec",
                        "background-light": "#f8f6f8",
                        "background-dark": "#000000",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "sans": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'shine': 'shine 2s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        shine: {
                            from: { backgroundPosition: '200% center' },
                            to: { backgroundPosition: '-200% center' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #000; color: #fff; }
        
        /* Advanced Glassmorphism */
        .glass-premium {
            background: linear-gradient(135deg, rgba(236,19,236,0.03) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(236, 19, 236, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
        }
        
        .glass-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            border-color: rgba(236, 19, 236, 0.3);
            background: rgba(25, 20, 25, 0.8);
            box-shadow: 0 10px 40px -10px rgba(236, 19, 236, 0.2);
            transform: translateY(-5px);
        }

        /* Text Gradients */
        .text-gradient-primary {
            background: linear-gradient(to right, #fff, #ec13ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* High-tech glow */
        .glow-accent {
            box-shadow: 0 0 20px rgba(236, 19, 236, 0.4), inset 0 0 10px rgba(236, 19, 236, 0.2);
        }
        
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
  </head>
  <body class="bg-background-dark text-slate-100 antialiased selection:bg-primary selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
